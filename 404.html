<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f4f5f2" />
    <title>页面未找到 · Zinc Acetate</title>
    <link rel="icon" href="/assets/avatar.png" />
    <link rel="stylesheet" href="/styles.css" />
    <style>
      .not-found {
        display: grid;
        min-height: 100svh;
        place-items: center;
        padding: 2rem;
      }

      .not-found-inner {
        width: min(100%, 720px);
        border-top: 8px solid var(--accent);
        padding-top: 2rem;
      }

      .not-found-code {
        margin: 0;
        color: var(--green);
        font-family: "Courier New", monospace;
        font-weight: 700;
      }

      .not-found h1 {
        max-width: none;
        margin-bottom: 1rem;
      }

      .not-found p {
        max-width: 32rem;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main class="not-found">
      <div class="not-found-inner">
        <p class="not-found-code">ERROR / 404</p>
        <h1>这里没有页面。</h1>
        <p>地址可能已经改变，或者页面还在构建中。</p>
        <a class="button button-primary" href="/">返回首页</a>
      </div>
    </main>
  </body>
</html>
